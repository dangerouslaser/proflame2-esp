# =============================================================================
# T-Embed CC1101 — web-flash variant.
#
# This YAML is what the GitHub Pages flasher (https://dangerouslaser.github.io/
# proflame2-esp/) builds and ships. It's identical to proflame2_tembed.yaml
# *except* every secret is stripped and replaced with either an unset default
# or a post-flash provisioning hook:
#
#   - WiFi creds       → Improv-WiFi over USB serial (browser pushes them
#                        right after install, no SSID hard-coded here).
#   - API encryption   → unique per-build key generated by CI, surfaced on
#                        the GitHub Pages flasher next to the Install button
#                        (Copy → paste into HA on adoption). HA's current
#                        "Add device" flow effectively requires a key.
#   - OTA password     → unique per-build, same flow. Without one, anyone
#                        on the LAN could push arbitrary firmware to the
#                        device — modest but non-zero protection.
#
# Both creds are extractable from the public firmware bin, so they're more
# UX bridges than real secrets. Users wanting permanent private credentials
# OTA-reflash with their own YAML + secrets.yaml — see docs/installation.md.
#   - Pairing identity → no serial_number / ecc_constants block. The CC1101
#                        boots with the schema-default placeholder serial and
#                        the user runs on-device learn-mode (long-press the
#                        encoder, point the OEM remote at it) to capture and
#                        persist the real values to NVS.
# =============================================================================

packages:
  base: !include proflame2_common.yaml

esphome:
  name: proflame2-tembed
  friendly_name: ProFlame2 T-Embed Remote

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: octal
  speed: 80MHz

logger:

# Per-build API encryption key — CI generates a fresh base64 key, writes
# it to secrets.yaml right before compile, and stamps the same string into
# the GitHub Pages flasher UI for users to Copy → paste into HA.
api:
  encryption:
    key: !secret webflash_api_key

# Per-build OTA password — same pattern. Stops casual LAN attackers from
# reflashing arbitrary firmware to the device.
ota:
  - platform: esphome
    password: !secret webflash_ota_password

# WiFi credentials are pushed by the browser via Improv-WiFi over USB serial
# right after the install completes. The fallback AP only ever fires if both
# Improv provisioning is skipped AND no creds were saved.
wifi:
  ap:
    ssid: "ProFlame2-TEmbed Setup"

captive_portal:

improv_serial:

# Single SPI bus shared between CC1101 and ST7789V LCD (per-CS muxing).
spi:
  clk_pin: GPIO11
  mosi_pin: GPIO9
  miso_pin: GPIO10

i2c:
  sda: GPIO8
  scl: GPIO18
  frequency: 100kHz
  scan: false

output:
  - platform: gpio
    id: lcd_backlight_output
    pin: GPIO21

light:
  - platform: binary
    id: lcd_backlight
    output: lcd_backlight_output
    restore_mode: ALWAYS_ON
    internal: true

  - platform: esp32_rmt_led_strip
    id: status_leds
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO14
    num_leds: 8
    default_transition_length: 200ms
    name: "Status LEDs"
    icon: "mdi:fire"
    restore_mode: ALWAYS_OFF
    effects:
      - addressable_lambda:
          name: "Fire"
          update_interval: 80ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              uint8_t roll = esp_random() & 0xFF;
              uint8_t r, g;
              if (roll < 107) {
                r = 200 + (esp_random() & 0x37);
                g = (esp_random() & 0x1F);
              } else if (roll < 192) {
                r = 220 + (esp_random() & 0x23);
                g = 80 + (esp_random() & 0x3F);
              } else {
                r = 240 + (esp_random() & 0x0F);
                g = 180 + (esp_random() & 0x3F);
              }
              it[i] = Color(r, g, 0);
            }

font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 14
  - file: "gfonts://Roboto"
    id: font_md
    size: 22
  - file: "gfonts://Roboto"
    id: font_lg
    size: 36

display:
  - platform: st7789v
    id: lcd
    model: CUSTOM
    height: 320
    width: 170
    offset_height: 0
    offset_width: 35
    cs_pin: GPIO41
    dc_pin: GPIO16
    reset_pin: GPIO40
    rotation: 90
    update_interval: 200ms
    lambda: |-
      id(ui)->draw(it);

# Web-flash builds bake the component source straight from the repo. CI
# always builds against the exact main-branch SHA the workflow checked out,
# so this resolves to "the version that was current when we built the bin."
external_components:
  - source:
      type: local
      path: components
    components: [proflame2]

# No serial_number / ecc_constants — the user pairs after first boot via the
# on-device learn-mode flow (long-press encoder, point OEM remote, confirm).
proflame2:
  cs_pin: GPIO12
  gdo0_pin: GPIO3
  pwr_en_pin: GPIO15
  ant_sw0_pin: GPIO48
  ant_sw1_pin: GPIO47

  power:
    id: fireplace_power
    on_turn_on:
      - if:
          condition:
            switch.is_on: leds_enabled
          then:
            - light.turn_on:
                id: status_leds
                effect: "Fire"
    on_turn_off:
      - light.turn_off:
          id: status_leds

  ui:
    id: ui
    display: lcd
    encoder: enc
    encoder_button: enc_btn
    pair_button: pair_btn
    status_sensor: ha_status
    battery_sensor: battery_pct
    backlight: lcd_backlight
    leds_switch: leds_enabled
    battery_bar_switch: battery_as_bar
    fonts:
      small: font_sm
      medium: font_md
      large: font_lg

sensor:
  - platform: proflame2
    id: battery_pct
    name: "Battery"
    update_interval: 30s
  - platform: rotary_encoder
    id: enc
    pin_a: GPIO4
    pin_b: GPIO5
    resolution: 2
  - platform: homeassistant
    id: room_temp
    entity_id: sensor.fireplace_room_temperature
    filters:
      - lambda: 'return (x - 32.0f) * 5.0f / 9.0f;'
  - platform: uptime
    type: seconds
    name: "Uptime"
  - platform: internal_temperature
    name: "Internal Temperature"
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: status
    id: ha_status
    name: "Status"
  - platform: gpio
    id: enc_btn
    pin:
      number: GPIO0
      mode:
        input: true
      inverted: true
    internal: true
  - platform: gpio
    id: pair_btn
    pin:
      number: GPIO6
      mode:
        input: true
      inverted: true
    name: "Pair Button"
    internal: true

switch:
  - platform: template
    id: leds_enabled
    name: "Status LEDs Enabled"
    icon: "mdi:led-strip-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - if:
          condition:
            switch.is_on: fireplace_power
          then:
            - light.turn_on:
                id: status_leds
                effect: "Fire"
    on_turn_off:
      - light.turn_off:
          id: status_leds

  - platform: template
    id: battery_as_bar
    name: "Battery as Bar"
    icon: "mdi:battery-50"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: factory_reset
    name: "Factory Reset"
    entity_category: config
  - platform: safe_mode
    name: "Safe Mode"
    entity_category: config

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      entity_category: diagnostic

# Same web fallback as the with-secrets build, but no auth — anyone on the
# LAN can hit it. If you don't want that, OTA-reflash with proflame2_tembed.yaml
# (which gates the web UI behind a password from secrets.yaml).
web_server:
  port: 80

time:
  - platform: homeassistant
    id: homeassistant_time
