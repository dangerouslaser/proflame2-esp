# =============================================================================
# Target board: LilyGo T-Embed CC1101 (ESP32-S3 + integrated CC1101 + ST7789V
# 1.9" LCD + rotary encoder + BQ27220 fuel gauge + Li-ion battery).
#
# Use this YAML if you have a T-Embed CC1101. For a generic ESP32 dev board
# with a CC1101 breakout, use proflame2_fireplace.yaml instead — that build
# omits the LCD/encoder/battery entities.
#
# Hardware reference: https://github.com/Xinyuan-LilyGO/T-Embed-CC1101
#
# Pin map (verified from LilyGo's official repo):
#   CC1101:    CS=12  GDO0=3   GDO2=38   PWR_EN=15  ANT_SW0=48  ANT_SW1=47
#   ST7789V:   CS=41  DC=16    RST=40    BL=21
#   SPI bus:   CLK=11 MOSI=9   MISO=10   (shared between CC1101 and LCD)
#   I2C bus:   SDA=8  SCL=18   (BQ27220 fuel gauge @ 0x55, BQ25896 @ 0x6B,
#              PN532 NFC @ 0x24 — only fuel gauge is used)
#   Encoder:   A=4    B=5      BTN=0    USER_KEY=6
# =============================================================================

# Shared proflame2 entity block (entity names, climate, heat-mode config,
# diagnostic sensors) lives in proflame2_common.yaml so both example
# configs stay in sync. T-Embed-specific pins, power-switch automations,
# and the on-device UI are deep-merged in below.
packages:
  base: !include proflame2_common.yaml

esphome:
  name: proflame2-tembed
  friendly_name: ProFlame2 T-Embed Remote

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

# T-Embed has 8MB OPI PSRAM. Not strictly required at this commit, but enabling
# it now keeps the build profile consistent with later commits that allocate
# display framebuffers in PSRAM.
psram:
  mode: octal
  speed: 80MHz

logger:
  # level: VERBOSE
  # logs:
  #   proflame2: VERBOSE

api:
  encryption:
    key: !secret fireplace_remote_api_key

ota:
  - platform: esphome
    password: !secret fireplace_remote_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ProFlame2-TEmbed"
    password: !secret fireplace_remote_wifi_ap_password

captive_portal:

# Single SPI bus — the T-Embed CC1101 multiplexes the radio and LCD on the
# same MOSI/MISO/CLK lines, distinguished by their CS pins. ESPHome's SPI
# layer serializes accesses by CS automatically.
spi:
  clk_pin: GPIO11
  mosi_pin: GPIO9
  miso_pin: GPIO10

# I2C bus — shared between the BQ27220 fuel gauge (0x55), the BQ25896
# charger (0x6B), and the PN532 NFC controller (0x24). We only talk to the
# fuel gauge for now.
i2c:
  sda: GPIO8
  scl: GPIO18
  frequency: 100kHz
  scan: false

# Backlight as a simple binary output. C4 keeps it always-on; later commits
# add a dim/sleep timeout via on_idle/on_interaction triggers.
output:
  - platform: gpio
    id: lcd_backlight_output
    pin: GPIO21

light:
  - platform: binary
    id: lcd_backlight
    output: lcd_backlight_output
    restore_mode: ALWAYS_ON
    internal: true

  # 8x WS2813 (WS2812B-compatible) addressable LED strip on the bottom edge of
  # the T-Embed CC1101 (data on GPIO14, GBR color order, powered by the same
  # GPIO15 PWR_EN we already drive HIGH for the CC1101 + antenna switch).
  # The "Fire" effect runs whenever the fireplace power switch is on; the LEDs
  # go dark when the fireplace is off — see proflame2.power.on_turn_on/off below.
  - platform: esp32_rmt_led_strip
    id: status_leds
    # The LilyGo example uses FastLED with WS2813 + "GBR" — but that's
    # FastLED-internal. ESPHome's WS2812 driver expects the chip's native
    # GRB byte order, which is what these LEDs actually want on the wire.
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO14
    num_leds: 8
    default_transition_length: 200ms
    name: "Status LEDs"
    icon: "mdi:fire"
    restore_mode: ALWAYS_OFF
    effects:
      # Per-LED warm flicker mixing red, orange, and yellow at ~5:4:3.
      # 80 ms update interval is fast enough to feel alive but slow enough
      # to keep RMT load low.
      - addressable_lambda:
          name: "Fire"
          update_interval: 80ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              uint8_t roll = esp_random() & 0xFF;
              uint8_t r, g;
              if (roll < 107) {
                // ~42% deep red
                r = 200 + (esp_random() & 0x37);
                g = (esp_random() & 0x1F);
              } else if (roll < 192) {
                // ~33% orange
                r = 220 + (esp_random() & 0x23);
                g = 80 + (esp_random() & 0x3F);
              } else {
                // ~25% yellow
                r = 240 + (esp_random() & 0x0F);
                g = 180 + (esp_random() & 0x3F);
              }
              it[i] = Color(r, g, 0);
            }

# Fonts pulled live from Google Fonts at build time; no manual download needed.
font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 14
  - file: "gfonts://Roboto"
    id: font_md
    size: 22
  - file: "gfonts://Roboto"
    id: font_lg
    size: 36

display:
  - platform: st7789v
    id: lcd
    model: CUSTOM
    height: 320
    width: 170
    offset_height: 0
    offset_width: 35
    cs_pin: GPIO41
    dc_pin: GPIO16
    reset_pin: GPIO40
    rotation: 90
    update_interval: 200ms
    lambda: |-
      id(ui)->draw(it);

external_components:
  - source: github://dangerouslaser/proflame2-esp@main
    components: [proflame2]
  # For local development against an editable component checkout, replace the
  # above with:
  # - source:
  #     type: local
  #     path: /config/components
  #   components: [proflame2]

# T-Embed-specific pin map, pairing seed, and overrides on top of the shared
# entity block from proflame2_common.yaml. The deep-merge keeps name/icon
# from common and adds the T-Embed-only id + LED-strip automations.
proflame2:
  cs_pin: GPIO12
  gdo0_pin: GPIO3
  # T-Embed CC1101 board quirks (verified against the official LilyGo example
  # in examples/cc1101_send/cc1101_send.ino). Without these driven before SPI
  # starts, the CC1101 has no Vcc and every register reads 0x00.
  #   GPIO15 — peripheral power-enable (driven HIGH)
  #   GPIO47 — antenna switch SW1     (HIGH for 315 MHz routing)
  #   GPIO48 — antenna switch SW0     (LOW  for 315 MHz routing)
  pwr_en_pin: GPIO15
  ant_sw0_pin: GPIO48
  ant_sw1_pin: GPIO47
  # Pre-pairing seed values — ignored at runtime once on-device learn-mode
  # writes a learned blob to NVS. For a fresh device, leave these at any safe
  # default and pair via the encoder UI on first boot.
  serial_number: !secret fireplace_remote_serial_number
  ecc_constants:
    c1: 0x08
    d1: 0x0E
    c2: 0x0B
    d2: 0x07

  power:
    id: fireplace_power
    # Animate the bottom-edge LED strip with the addressable fire effect
    # whenever the fireplace is on AND the user hasn't disabled the strip
    # via the "Status LEDs Enabled" toggle (HA or device UI cog).
    # on_turn_off always kills the LEDs — no condition.
    on_turn_on:
      - if:
          condition:
            switch.is_on: leds_enabled
          then:
            - light.turn_on:
                id: status_leds
                effect: "Fire"
    on_turn_off:
      - light.turn_off:
          id: status_leds

  # Standalone physical UI. Renders fireplace state on the LCD and adjusts
  # power/flame/fan/light via the rotary encoder. status_sensor lets the UI
  # show "HA: connected" / "HA: offline" so users know whether HA is reachable.
  ui:
    id: ui
    display: lcd
    encoder: enc
    encoder_button: enc_btn
    # Long-press of the dedicated user button (T-Embed GPIO 6) starts learn
    # mode. Encoder long-press still works as a backup.
    pair_button: pair_btn
    status_sensor: ha_status
    battery_sensor: battery_pct
    # When set, the UI auto-dims the LCD backlight after 30 s of no
    # encoder/button activity and wakes it on the next interaction.
    backlight: lcd_backlight
    # Settings cog on the UI that toggles this switch — same source of
    # truth as the HA "Status LEDs Enabled" toggle.
    leds_switch: leds_enabled
    # Toggles the status-bar battery indicator between graphical bar (ON)
    # and "BAT NN%" text (OFF). Default: ON.
    battery_bar_switch: battery_as_bar
    # When ON, the LCD shows a clock when the user has been idle past the
    # backlight timeout, instead of going dark. Requires the time: source
    # below. Default: OFF (preserves battery).
    clock_on_idle_switch: clock_on_idle
    # Software-flips encoder rotation direction. Default: OFF.
    encoder_invert_switch: encoder_inverted
    # Drives the idle timeout — options 15s / 30s / 1m / 5m / never.
    # Default: 30s (matches the previous hard-coded value).
    backlight_timeout_select: backlight_timeout
    # Clock source for the screensaver. Same homeassistant_time: id used
    # at the bottom of this YAML.
    time: homeassistant_time
    fonts:
      small: font_sm
      medium: font_md
      large: font_lg

sensor:
  # Battery state-of-charge from the BQ27220 fuel gauge (T-Embed CC1101).
  # Polled every 30 s; the UI status bar reads this sensor's last published
  # value to render "BAT NN%".
  - platform: proflame2
    id: battery_pct
    name: "Battery"
    update_interval: 30s

  # Rotary encoder: A=4, B=5. The T-Embed CC1101 ships with a TWO03-latch
  # encoder (2 detents per A/B cycle), matching what LilyGo's factory
  # firmware configures via `RotaryEncoder::LatchMode::TWO03`. Resolution=2
  # makes one detent = one step. Resolution=1 produced inconsistent (0–2)
  # steps per click because half-cycles rounded unevenly.
  - platform: rotary_encoder
    id: enc
    pin_a: GPIO4
    pin_b: GPIO5
    resolution: 2
  - platform: homeassistant
    id: room_temp
    entity_id: sensor.fireplace_room_temperature
    filters:
      - lambda: 'return (x - 32.0f) * 5.0f / 9.0f;'  # °F → °C
  - platform: uptime
    type: seconds
    name: "Uptime"
  - platform: internal_temperature
    name: "Internal Temperature"
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""

binary_sensor:
  - platform: status
    id: ha_status
    name: "Status"
  # Encoder push-button: GPIO 0 is a strap pin. LilyGo wires it with a hardware
  # pull-up so we declare INPUT-only and rely on the external pull-up. Inverted
  # because the button pulls the line LOW when pressed.
  - platform: gpio
    id: enc_btn
    pin:
      number: GPIO0
      mode:
        input: true
      inverted: true
    internal: true

  # Dedicated user button (BOARD_USER_KEY = GPIO 6 on T-Embed CC1101). Long
  # press triggers on-device pairing flow. Hardware pull-up; pressing pulls
  # the line LOW so we invert.
  - platform: gpio
    id: pair_btn
    pin:
      number: GPIO6
      mode:
        input: true
      inverted: true
    name: "Pair Button"
    internal: true

# Top-level switches that aren't part of the proflame2 protocol entities.
switch:
  # Master enable/disable for the bottom-edge WS2812 strip's "Fire" effect.
  # ON: fireplace power-on triggers the addressable_lambda animation.
  # OFF: animation never starts, and any in-flight animation is killed
  # (the on_turn_off action below). Surfaces both in HA and on the device
  # UI's settings cog (Field::kLeds in proflame2_ui.cpp).
  - platform: template
    id: leds_enabled
    name: "Status LEDs Enabled"
    icon: "mdi:led-strip-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    # When re-enabled, restart the fire effect *if* the fireplace is
    # currently on — otherwise wait until the next power-on. Disabling
    # always kills the LEDs immediately.
    on_turn_on:
      - if:
          condition:
            switch.is_on: fireplace_power
          then:
            - light.turn_on:
                id: status_leds
                effect: "Fire"
    on_turn_off:
      - light.turn_off:
          id: status_leds

  # Settings-page toggle (also surfaces in HA) for the status-bar battery
  # rendering: ON = graphical bar, OFF = "BAT NN%" text.
  - platform: template
    id: battery_as_bar
    name: "Battery as Bar"
    icon: "mdi:battery-50"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

  # When ON, the LCD shows a clock once the user is idle past the backlight
  # timeout (instead of going dark). Off-by-default to preserve battery.
  - platform: template
    id: clock_on_idle
    name: "Clock on Idle"
    icon: "mdi:clock-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

  # Flips encoder rotation direction in software. Useful if the physical
  # encoder feels backwards (some T-Embed batches have differing detent
  # polarity). Off-by-default — only flip if you've confirmed the direction
  # feels wrong.
  - platform: template
    id: encoder_inverted
    name: "Invert Encoder Direction"
    icon: "mdi:rotate-360"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

select:
  # Drives the LCD backlight idle timeout (and, when clock_on_idle is on,
  # the screensaver activation threshold). String options match what the
  # UI's backlight_idle_ms_() helper parses.
  - platform: template
    id: backlight_timeout
    name: "Backlight Timeout"
    icon: "mdi:lightbulb-on-outline"
    options:
      - "15s"
      - "30s"
      - "1m"
      - "5m"
      - "never"
    initial_option: "30s"
    optimistic: true
    restore_value: true
    entity_category: config

button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: factory_reset
    name: "Factory Reset"
    entity_category: config
  - platform: safe_mode
    name: "Safe Mode"
    entity_category: config

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      entity_category: diagnostic

web_server:
  port: 80
  auth:
    username: admin
    password: !secret fireplace_remote_web_password

time:
  - platform: homeassistant
    id: homeassistant_time
