name: Web flasher

on:
  push:
    branches: [main]
    paths:
      - "components/proflame2/**"
      - "proflame2_common.yaml"
      - "proflame2_tembed_webflash.yaml"
      - "proflame2_fireplace_webflash.yaml"
      - "web/**"
      - ".github/workflows/webflash.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('.github/workflows/webflash.yml') }}

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: platformio-${{ hashFiles('proflame2_tembed_webflash.yaml', 'proflame2_fireplace_webflash.yaml', 'proflame2_common.yaml', 'components/proflame2/**') }}
          restore-keys: |
            platformio-

      - name: Install ESPHome
        run: pip install --upgrade esphome

      - name: Generate per-build credentials
        id: creds
        run: |
          set -euo pipefail
          # API key: 32 random bytes, base64 — what ESPHome's API encryption
          # block expects.
          API_KEY="$(openssl rand -base64 32)"
          # OTA password: 32 hex chars — easier on the eyes than base64
          # when copy-pasted, no special characters to wrangle.
          OTA_PASSWORD="$(openssl rand -hex 16)"

          {
            echo "webflash_api_key: \"${API_KEY}\""
            echo "webflash_ota_password: \"${OTA_PASSWORD}\""
          } > secrets.yaml

          # Pass to later steps. Not masked — the values are intentionally
          # public (rendered on the GH Pages site, extractable from the
          # firmware bin). Masking would just complicate debugging.
          {
            echo "api_key<<EOF"
            echo "${API_KEY}"
            echo "EOF"
            echo "ota_password<<EOF"
            echo "${OTA_PASSWORD}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compile T-Embed firmware
        run: esphome compile proflame2_tembed_webflash.yaml

      - name: Compile generic ESP32 firmware
        run: esphome compile proflame2_fireplace_webflash.yaml

      - name: Stage site
        env:
          API_KEY: ${{ steps.creds.outputs.api_key }}
          OTA_PASSWORD: ${{ steps.creds.outputs.ota_password }}
        run: |
          set -euo pipefail
          mkdir -p _site/firmware
          cp .esphome/build/proflame2-tembed/.pioenvs/proflame2-tembed/firmware.factory.bin \
             _site/firmware/proflame2-tembed.factory.bin
          cp .esphome/build/proflame2-fireplace/.pioenvs/proflame2-fireplace/firmware.factory.bin \
             _site/firmware/proflame2-fireplace.factory.bin
          cp web/index.html  _site/index.html
          cp web/style.css   _site/style.css

          # Stamp the manifests with a version derived from the git ref.
          if [ -n "${GITHUB_REF_NAME:-}" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          sed "s/__VERSION__/${VERSION}/" web/manifest-tembed.json.tmpl    > _site/manifest-tembed.json
          sed "s/__VERSION__/${VERSION}/" web/manifest-fireplace.json.tmpl > _site/manifest-fireplace.json

          # Stamp credentials into the page. | as the sed separator since
          # base64 keys can contain / but not |.
          sed -i "s|__API_KEY__|${API_KEY}|g" _site/index.html
          sed -i "s|__OTA_PASSWORD__|${OTA_PASSWORD}|g" _site/index.html

          ls -la _site _site/firmware

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
