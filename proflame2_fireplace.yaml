# =============================================================================
# Target board: generic ESP32 dev board + CC1101 breakout (e.g. ESP32-WROOM)
#
# Use this YAML if you wired a CC1101 433/315 MHz module to a plain ESP32 dev
# board over SPI. For the LilyGo T-Embed CC1101 (integrated radio + LCD +
# rotary encoder + battery), use proflame2_tembed.yaml instead.
#
# Required wiring (any free SPI-capable GPIOs work — pins below are examples):
#   CC1101 CS    → GPIO 21
#   CC1101 GDO0  → GPIO 22  (optional; only needed for on-device pairing)
#   SPI MOSI     → GPIO 23
#   SPI MISO     → GPIO 19
#   SPI SCLK     → GPIO 18
# Adjust the cs_pin / gdo0_pin / spi: section below to match your wiring.
# =============================================================================

esphome:
  name: living-room-fireplace-remote
  friendly_name: Living Room Fireplace Remote

esp32:
  board: esp32dev
  cpu_frequency: 240MHz
  flash_size: 4MB
  framework:
    type: esp-idf
    version: recommended

logger:

api:
  encryption:
    key: !secret fireplace_remote_api_key

ota:
  - platform: esphome
    password: !secret fireplace_remote_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Living-Room-Fireplace-Remote"
    password: !secret fireplace_remote_wifi_ap_password

captive_portal:

spi:
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23

external_components:
  - source: github://dangerouslaser/proflame2-esp@main
    components: [proflame2]

proflame2:
  id: fireplace
  cs_pin: GPIO21
  gdo0_pin: GPIO22
  serial_number: !secret fireplace_remote_serial_number
  # ECC pairing constants — must match your remote ↔ fireplace pairing.
  # See README "Pairing your remote" for how to derive these.
  ecc_constants:
    c1: 0x08
    d1: 0x0E
    c2: 0x0B
    d2: 0x07

  power:
    name: "Power"
    icon: "mdi:fireplace"

  pilot:
    name: "Pilot Mode"
    icon: "mdi:fire"
    entity_category: config

  aux:
    name: "Aux Power"
    icon: "mdi:power-plug"

  flame:
    name: "Flame Height"
    icon: "mdi:fire"
    mode: slider

  fan:
    name: "Fan Speed"
    icon: "mdi:fan"
    mode: slider

  light:
    name: "Fireplace Light"
    icon: "mdi:lightbulb"

  secondary_flame:
    name: "Secondary Flame"
    icon: "mdi:fire"

  # HA-side pairing controls. Three explicit clicks complete a pairing:
  #   1. Press OEM remote button (puts the fireplace into learn-mode).
  #   2. "Pair Remote" arms the receiver.
  #   3. Press OEM remote 2-3 more times so 3 packets agree.
  #   4. "Confirm Pairing" commits the captured serial + ECC to NVS.
  # Requires gdo0_pin wired up — without it, RX is unavailable.
  pair:
    name: "Pair Remote"
    icon: "mdi:remote"
  pair_confirm:
    name: "Confirm Pairing"
    icon: "mdi:check-circle-outline"
  pair_cancel:
    name: "Cancel Pairing"
    icon: "mdi:close-circle-outline"

  # Read-only diagnostic exports of the active pairing identity. Populated
  # at boot from whichever source won (NVS or YAML); refreshed automatically
  # on a successful learn-mode commit. Surfaces in HA's Diagnostics panel.
  serial_number_sensor:
    name: "Serial Number"
  ecc_constants_sensor:
    name: "ECC Constants"
  pairing_source_sensor:
    name: "Pairing Source"

  # Persistent heat-mode behavior (applied each time the climate auto-activates
  # the burner). Tweak at runtime in HA — no reflash needed.
  heat_flame_level:
    name: "Heat Flame Level"
    icon: "mdi:fire"
    entity_category: config
  heat_fan_level:
    name: "Heat Fan Level"
    icon: "mdi:fan"
    entity_category: config
  heat_secondary_flame:
    name: "Heat Secondary Flame"
    icon: "mdi:fire"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF

  climate:
    name: "Fireplace"
    sensor: room_temp
    visual:
      min_temperature: 60°F
      max_temperature: 85°F
      temperature_step:
        target_temperature: 0.5°F
        current_temperature: 0.1°F

sensor:
  # Climate's current_temperature source. Use an HA template helper as
  # indirection so the upstream sensor can be swapped without reflashing.
  - platform: homeassistant
    id: room_temp
    entity_id: sensor.fireplace_room_temperature
    filters:
      - lambda: 'return (x - 32.0f) * 5.0f / 9.0f;'  # °F → °C
  - platform: uptime
    type: seconds
    name: "Uptime Sensor"
  - platform: internal_temperature
    name: "Internal Temperature"
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

binary_sensor:
  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config
  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      entity_category: diagnostic
  - platform: template
    name: "Last Restart"
    id: device_last_restart
    icon: mdi:clock
    entity_category: diagnostic
    device_class: timestamp

web_server:
  port: 80
  auth:
    username: admin
    password: !secret fireplace_remote_web_password

time:
  - platform: homeassistant
    id: homeassistant_time
