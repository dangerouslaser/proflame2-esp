# =============================================================================
# Shared proflame2 entity block, used by both proflame2_fireplace.yaml (generic
# ESP32 + CC1101 breakout) and proflame2_tembed.yaml (LilyGo T-Embed CC1101).
#
# Brought in via the ESPHome `packages:` directive in each example YAML:
#
#   packages:
#     base: !include proflame2_common.yaml
#
# Per-board YAMLs supply the bits that *can't* be shared:
#   - SPI / I2C / pin map (cs_pin, gdo0_pin, T-Embed power-enable + antenna)
#   - serial_number + ecc_constants (per-fireplace pairing identity)
#   - power-switch automations (T-Embed wires it to the LED strip)
#   - the `ui:` sub-block (T-Embed only)
# Everything else — entity names, icons, modes, the heat-mode block, the
# climate config — is identical across boards and lives here.
# =============================================================================

proflame2:
  id: fireplace

  power:
    name: "Power"
    icon: "mdi:fireplace"

  pilot:
    name: "Pilot Mode"
    icon: "mdi:fire"
    entity_category: config

  aux:
    name: "Aux Power"
    icon: "mdi:power-plug"

  flame:
    name: "Flame Height"
    icon: "mdi:fire"
    mode: slider

  fan:
    name: "Fan Speed"
    icon: "mdi:fan"
    mode: slider

  light:
    name: "Fireplace Light"
    icon: "mdi:lightbulb"

  secondary_flame:
    name: "Secondary Flame"
    icon: "mdi:fire"

  # HA-side pairing controls. Three explicit clicks complete a pairing:
  #   1. "Pair Remote" arms a 60 s capture window.
  #   2. Press OEM remote 3+ times so packets agree.
  #   3. "Confirm Pairing" commits captured serial + ECC to NVS.
  # T-Embed users can also drive the same flow from the on-device encoder.
  # Requires gdo0_pin wired up — without it, RX is unavailable.
  pair:
    name: "Pair Remote"
    icon: "mdi:remote"
  pair_confirm:
    name: "Confirm Pairing"
    icon: "mdi:check-circle-outline"
  pair_cancel:
    name: "Cancel Pairing"
    icon: "mdi:close-circle-outline"

  # Read-only diagnostic exports of the active pairing identity. Populated
  # at boot from whichever source won (NVS or YAML); refreshed automatically
  # on a successful learn-mode commit. Surfaces in HA's Diagnostics panel.
  serial_number_sensor:
    name: "Serial Number"
  ecc_constants_sensor:
    name: "ECC Constants"
  pairing_source_sensor:
    name: "Pairing Source"

  # Persistent heat-mode behavior (applied each time the climate auto-activates
  # the burner). Tweak at runtime in HA — no reflash needed.
  heat_flame_level:
    name: "Heat Flame Level"
    icon: "mdi:fire"
    entity_category: config
  heat_fan_level:
    name: "Heat Fan Level"
    icon: "mdi:fan"
    entity_category: config
  heat_secondary_flame:
    name: "Heat Secondary Flame"
    icon: "mdi:fire"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF

  climate:
    name: "Fireplace"
    sensor: room_temp
    visual:
      min_temperature: 60°F
      max_temperature: 85°F
      temperature_step:
        target_temperature: 0.5°F
        current_temperature: 0.1°F
